<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axilwood Invitations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div id="header-placeholder"></div>

    <main class="container mx-auto px-6 py-20 text-center min-h-screen">
        <h1 class="text-4xl font-extrabold text-gray-800">Choose Your Event</h1>
        <p class="mt-4 text-lg text-gray-600">Select an event type to start creating your beautiful, dynamic invitation.</p>
        
        <div class="mt-12 grid md:grid-cols-3 gap-8">
            <a href="/Invitations/weddings" class="block bg-white p-8 rounded-xl shadow-md hover:shadow-lg transition-shadow border-t-4 border-green-600 cursor-pointer">
                <h3 class="text-2xl font-bold text-gray-800">Weddings</h3>
                <p class="mt-2 text-gray-600">Create elegant, traditional Kerala wedding invitations.</p>
            </a>

            <div class="bg-gray-100 p-8 rounded-xl border border-gray-200 opacity-70">
                <h3 class="text-2xl font-bold text-gray-500">Birthdays</h3>
                <span class="inline-block mt-2 bg-gray-200 text-gray-600 text-xs px-2 py-1 rounded-full uppercase tracking-wide font-bold">Coming Soon</span>
            </div>

            <div class="bg-gray-100 p-8 rounded-xl border border-gray-200 opacity-70">
                <h3 class="text-2xl font-bold text-gray-500">Anniversaries</h3>
                <span class="inline-block mt-2 bg-gray-200 text-gray-600 text-xs px-2 py-1 rounded-full uppercase tracking-wide font-bold">Coming Soon</span>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module" src="/scripts.js"></script>
</body>
</html>
